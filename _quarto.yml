project:
  type: website
  output-dir: _site
  resources:
    - robots.txt
  render:
    - "*.qmd"

website:
  title: "State Media & LLMs"
  navbar:
    background: light
    left:
      - href: index.qmd
        text: Home
      - href: contamination.qmd
        text: Training Data
      - href: audit.qmd
        text: Model Audit
      - href: memorization.qmd
        text: Memorization
      - href: checkpoints.qmd
        text: Pretraining
      - href: global.qmd
        text: Global
      - href: about.qmd
        text: About
  page-footer:
    center: "Companion site for *How Government Control of Media Influences Large Language Models*"

format:
  html:
    theme:
      light:
        - cosmo
        - styles.scss
    css: styles.css
    toc: true
    grid:
      body-width: 1100px
    mainfont: "'Charter', 'Georgia', 'Noto Serif SC', serif"
    include-in-header:
      text: '<meta name="robots" content="noindex, nofollow">'
    include-before-body:
      text: '<div style="background:#dc3545;color:white;text-align:center;padding:10px;font-weight:bold;font-size:0.85em;letter-spacing:0.5px;">MATERIAL UNDER MEDIA EMBARGO. NO SEARCH OR LINK INDEXING. PLEASE DO NOT POST OR DISTRIBUTE.</div>'
